services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./prebuilts:/app/prebuilts:ro
      - ./registry:/app/registry:ro
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omniextract

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - local-models
    networks:
      - omniextract

  demo:
    build:
      context: .
      dockerfile: docker/demo.Dockerfile
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - omniextract

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - omniextract

networks:
  omniextract:
    driver: bridge

volumes:
  redis_data:
