# OmniExtract Gateway — Dynamic Model Registry
#
# Add new models via Pull Request. No code changes required.
# Fields:
#   id:             Model identifier used in ExtractionRequest.engine_config.model
#   vision:         Whether the model supports image/document input
#   context_window: Maximum context tokens
#   requires_gpu:   Only relevant for provider: local
#
# To add a new provider, add an entry under `providers:` following the same schema.

