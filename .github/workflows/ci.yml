name: CI

on:
  # Validate every code change in common long-lived branches and feature branches.
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:

jobs:
  lint-and-test:
    # Baseline quality gate: lint + tests on supported Python versions.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,demo]'

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q

  contract-checks:
    # Dedicated contract job: OpenAPI schema/signature checks for public API stability.
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,demo]'

      - name: Run contract tests
        run: pytest -q tests/integration/test_openapi_contract.py tests/integration/test_openapi_signature_snapshot.py

      - name: Verify OpenAPI signature snapshot
        run: |
          make openapi-signature
          if ! git diff --exit-code tests/fixtures/openapi_signature.json; then
            echo "OpenAPI signature snapshot drift detected."
            echo "Run: make openapi-signature"
            echo "Then commit tests/fixtures/openapi_signature.json"
            git --no-pager diff -- tests/fixtures/openapi_signature.json
            exit 1
          fi
