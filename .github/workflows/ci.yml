name: CI

on:
  # Validate every code change in common long-lived branches and feature branches.
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:

jobs:
  lint-and-test:
    # Milestone 1 quality gate: lint + unit tests on supported Python versions.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q
